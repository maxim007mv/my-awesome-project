<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="Обратная связь: вопросы, предложения, баг‑репорты. Напишите нам — ответим." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="yanqwip — Контакты" />
  <meta property="og:description" content="Есть идея или вопрос? Оставьте сообщение — мы на связи." />
  <meta property="og:image" content="/assets/og-image.svg" />
  <meta property="og:url" content="https://yanqwip.ru/contacts.html" />
  <meta property="og:site_name" content="yanqwip" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#0b0f14" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@600;700&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans:['Inter','ui-sans-serif','system-ui'], poppins:['Poppins','Inter'], unbounded:['Unbounded','Poppins','Inter'] }, colors: { bg:'#0b0f14' } } } };
  </script>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml" />
</head>
<body class="bg-bg text-slate-200 font-sans">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-24 -left-24 h-[24rem] w-[24rem] rounded-full bg-fuchsia-600/20 blur-[96px]"></div>
    <div class="absolute -right-16 top-10 h-[20rem] w-[20rem] rounded-full bg-cyan-400/20 blur-[96px]"></div>
  </div>

  <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/5 ring-1 ring-white/15">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a class="inline-flex items-center gap-2" href="./index.html" aria-label="yanqwip, на главную">
        <img class="h-8 w-8 rounded-md object-cover drop-shadow-[0_0_10px_rgba(124,58,237,0.6)]" src="https://i.ibb.co/JWLty2jM/photo-2025-07-01-08-51-19-2.jpg" alt="Логотип yanqwip" />
        <span class="font-unbounded text-lg font-bold tracking-tight">yanqwip</span>
      </a>
      <button class="nav-toggle md:hidden px-3 py-2 rounded-xl bg-slate-900/60 ring-1 ring-white/15 text-slate-100 shadow-lg" aria-label="Открыть меню" aria-expanded="false">☰</button>
      <nav class="main-nav hidden md:block absolute md:static right-4 top-16 md:top-auto">
        <ul class="md:flex md:gap-2 bg-slate-900/70 md:bg-transparent p-2 md:p-0 rounded-2xl md:rounded-none ring-1 ring-white/15 md:ring-0">
          <li><a class="block px-3 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 hover:ring-1 hover:ring-white/15 transition" href="./index.html">Главная</a></li>
          <li><a class="block px-3 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 hover:ring-1 hover:ring-white/15 transition" href="./about.html">О нас</a></li>
          <li><a class="block px-3 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/5 hover:ring-1 hover:ring-white/15 transition" href="./contacts.html">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <nav class="max-w-7xl mx-auto px-4 mt-4" aria-label="Хлебные крошки">
      <ol class="flex gap-2 text-slate-400 text-sm">
        <li><a class="text-cyan-300 hover:text-cyan-200" href="./index.html">Главная</a></li>
        <li>→</li>
        <li>Контакты</li>
      </ol>
    </nav>

    

    <section class="py-8">
      <div class="max-w-7xl mx-auto px-4">
        <article class="rounded-2xl p-6 bg-white/5 backdrop-blur-xl ring-1 ring-white/15 shadow-xl max-w-3xl mx-auto">
          <h2 class="font-unbounded text-2xl mb-2">Обратная связь</h2>
          <form id="feedback-form" class="grid gap-3" action="#" method="post" novalidate>
            <div class="grid gap-1">
              <label for="fb-name" class="text-slate-400 text-sm">Имя (необязательно)</label>
              <input id="fb-name" name="name" type="text" placeholder="Иван" class="px-3 py-2 rounded-xl bg-slate-900/60 text-slate-100 ring-1 ring-white/15 focus:outline-none focus:ring-2 focus:ring-cyan-400/50" />
            </div>
            <div class="grid gap-1">
              <label for="fb-email" class="text-slate-400 text-sm">Email (необязательно)</label>
              <input id="fb-email" name="email" type="email" placeholder="email@example.com" class="px-3 py-2 rounded-xl bg-slate-900/60 text-slate-100 ring-1 ring-white/15 focus:outline-none focus:ring-2 focus:ring-cyan-400/50" />
            </div>
            <div class="grid gap-1">
              <label for="fb-subject" class="text-slate-400 text-sm">Тема (необязательно)</label>
              <input id="fb-subject" name="subject" type="text" placeholder="Предложение / Отзыв / Баг" class="px-3 py-2 rounded-xl bg-slate-900/60 text-slate-100 ring-1 ring-white/15 focus:outline-none focus:ring-2 focus:ring-cyan-400/50" />
            </div>
            <div class="grid gap-1">
              <label for="fb-message" class="text-slate-400 text-sm">Сообщение</label>
              <textarea id="fb-message" name="message" rows="5" placeholder="Напишите всё, что думаете — это поможет нам стать лучше" required class="px-3 py-2 rounded-xl bg-slate-900/60 text-slate-100 ring-1 ring-white/15 focus:outline-none focus:ring-2 focus:ring-cyan-400/50"></textarea>
            </div>
            <div>
              <button class="px-4 py-2 rounded-xl font-semibold text-slate-900 bg-gradient-to-r from-violet-500 to-cyan-400 shadow-[0_0_28px_rgba(124,58,237,0.35),0_0_48px_rgba(34,211,238,0.25)] hover:shadow-[0_0_40px_rgба(124,58,237,0.45),0_0_60px_rgба(34,211,238,0.35)] transition" type="submit">Отправить отзыв</button>
            </div>
          </form>
          <div id="feedback-result" class="mt-3 text-slate-400 text-sm hidden"></div>
        </article>
      </div>
    </section>
  </main>

  <footer class="mt-6 backdrop-blur-xl bg-white/5 ring-1 ring-white/15">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div class="text-sm">© <span id="year"></span> yanqwip</div>
      <div class="flex gap-2">
        <a class="w-9 h-9 grid place-items-center rounded-xl ring-1 ring-white/15 text-slate-300 hover:text-white hover:bg-white/5 transition" href="#" aria-label="GitHub">GH</a>
        <a class="w-9 h-9 grid place-items-center rounded-xl ring-1 ring-white/15 text-slate-300 hover:text-white hover:bg-white/5 transition" href="#" aria-label="Telegram">TG</a>
        <a class="w-9 h-9 grid place-items-center rounded-xl ring-1 ring-white/15 text-slate-300 hover:text-white hover:bg-white/5 transition" href="#" aria-label="Twitter">TW</a>
      </div>
    </div>
  </footer>

  <script src="./main.js"></script>
</body>
</html>
